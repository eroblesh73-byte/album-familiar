<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Álbum Familiar AR</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.136.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  overflow:hidden;
  font-family:Georgia,serif;
}

#splash{
  position:fixed;
  inset:0;
  background:linear-gradient(160deg,#2c1a0e,#1a1008);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:999;
}

#splash h1{
  color:#f5e6c8;
  margin-bottom:10px;
}

#splash p{
  color:#c4a97d;
  margin-bottom:30px;
  max-width:320px;
}

#splash button{
  background:#c4813a;
  color:white;
  border:none;
  border-radius:50px;
  padding:15px 35px;
  font-size:18px;
  cursor:pointer;
}

#contenedor{
  position:fixed;
  inset:0;
  display:none;
}

#indicador{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.75);
  color:white;
  padding:10px 20px;
  border-radius:30px;
  z-index:100;
}

#panel{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:rgba(20,12,4,.92);
  padding:20px;
  transform:translateY(100%);
  transition:.3s;
  z-index:100;
}

#panel.visible{
  transform:translateY(0);
}

#titulo{
  color:#f5e6c8;
  margin-bottom:10px;
}

#recuerdo{
  color:#c4a97d;
}

#video-recuerdo{
  display:none;
}
</style>
</head>

<body>

<div id="splash">
  <div style="font-size:60px;">📷</div>

  <h1>Álbum Familiar</h1>

  <p>
    Apunta la cámara a una fotografía para revivir un recuerdo.
  </p>

  <button onclick="iniciar()">
    Abrir cámara
  </button>
</div>

<div id="contenedor">
  <div id="indicador">
    📸 Apunta a una foto...
  </div>
</div>

<div id="panel">
  <h2 id="titulo"></h2>
  <p id="recuerdo"></p>
</div>

<video
  id="video-recuerdo"
  src="./videos/video1.mp4"
  loop
  muted
  playsinline
  crossorigin="anonymous">
</video>

<script>

const FOTOS = [{
  titulo:"Mi recuerdo",
  recuerdo:"Aquí va tu recuerdo especial."
}];

async function iniciar(){

  try{

    document.getElementById("splash").style.display="none";
    document.getElementById("contenedor").style.display="block";

    const mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: document.querySelector("#contenedor"),
      imageTargetSrc: "./foto1.mind"
    });

    const {renderer, scene, camera} = mindarThree;

    const light = new THREE.HemisphereLight(
      0xffffff,
      0xbbbbff,
      1
    );

    scene.add(light);

    const anchor = mindarThree.addAnchor(0);

    const video = document.getElementById("video-recuerdo");

    const texture = new THREE.VideoTexture(video);

    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(1,0.56),
      new THREE.MeshBasicMaterial({
        map:texture
      })
    );

    anchor.group.add(plane);

    anchor.onTargetFound = () => {

      video.play();

      document.getElementById("titulo").textContent =
        FOTOS[0].titulo;

      document.getElementById("recuerdo").textContent =
        FOTOS[0].recuerdo;

      document.getElementById("panel")
        .classList.add("visible");
    };

    anchor.onTargetLost = () => {

      video.pause();

      document.getElementById("panel")
        .classList.remove("visible");
    };

    await mindarThree.start();

    renderer.setAnimationLoop(() => {
      renderer.render(scene,camera);
    });

    console.log("MindAR iniciado correctamente");

  }catch(error){

    console.error(error);

    alert(
      "Error:\n\n" +
      error.message
    );
  }
}

</script>

</body>
</html>
