<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Álbum Familiar AR</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:Georgia,serif; }

    #splash {
      position:fixed; inset:0;
      background:linear-gradient(160deg,#2c1a0e,#1a1008);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:999; padding:2rem; text-align:center;
    }
    #splash h1 { font-size:2rem; color:#f5e6c8; margin-bottom:0.5rem; }
    #splash p { color:#c4a97d; font-size:1rem; line-height:1.6; max-width:300px; margin-bottom:2rem; }
    #splash button {
      background:#c4813a; color:#fff; border:none;
      padding:1rem 2.5rem; border-radius:50px; font-size:1.1rem; cursor:pointer;
    }

    #contenedor { position:fixed; inset:0; display:none; }

    #contenedor video.camara {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover;
    }

    canvas { position:absolute; inset:0; width:100%!important; height:100%!important; }

    #panel {
      position:fixed; bottom:0; left:0; right:0;
      background:rgba(20,12,4,0.92); border-top:1px solid #c4813a55;
      padding:1rem 1.5rem 2rem; transform:translateY(100%);
      transition:transform 0.4s; z-index:100;
    }
    #panel.visible { transform:translateY(0); }
    #panel .etiqueta { font-size:0.7rem; color:#c4813a; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:0.4rem; }
    #panel .titulo { font-size:1.1rem; color:#f5e6c8; margin-bottom:0.5rem; }
    #panel .recuerdo { font-size:0.95rem; color:#c4a97d; line-height:1.7; font-style:italic; }

    #indicador {
      position:fixed; top:1.5rem; left:50%; transform:translateX(-50%);
      background:rgba(20,12,4,0.85); color:#c4a97d; font-size:0.85rem;
      padding:0.5rem 1.2rem; border-radius:50px; z-index:100; white-space:nowrap;
    }
    #indicador.oculto { display:none; }

    #video-recuerdo { display:none; }
  </style>
</head>
<body>

<div id="splash">
  <div style="font-size:3.5rem;margin-bottom:1rem;animation:p 2s infinite">📷</div>
  <h1>Álbum Familiar</h1>
  <p>Apunta la cámara a una foto de la casa y revive el recuerdo.</p>
  <button onclick="iniciar()">Abrir cámara</button>
</div>

<style>@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}</style>

<div id="contenedor">
  <div id="indicador">📸 Apunta a una foto...</div>
</div>

<div id="panel">
  <div class="etiqueta">✦ Recuerdo</div>
  <div class="titulo" id="titulo"></div>
  <div class="recuerdo" id="recuerdo"></div>
</div>

<video id="video-recuerdo" src="videos/video1.mp4" loop playsinline webkit-playsinline crossorigin="anonymous"></video>

<script>
const FOTOS = [
  {
    titulo: "Mi recuerdo",
    recuerdo: "Aquí va el texto de tu recuerdo especial..."
  }
];

async function iniciar() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('contenedor').style.display = 'block';

  const mindarController = new window.MINDAR.IMAGE.MindARThree({
    container: document.getElementById('contenedor'),
    imageTargetSrc: 'foto1.mind',
  });

  const { renderer, scene, camera } = mindarController;

  const videoRecuerdo = document.getElementById('video-recuerdo');

  // Crear plano con el video encima del marcador
  const geometry = new THREE.PlaneGeometry(1, 0.55);
  const texture = new THREE.VideoTexture(videoRecuerdo);
  const material = new THREE.MeshBasicMaterial({ map: texture });
  const plane = new THREE.Mesh(geometry, material);

  const anchor = mindarController.addAnchor(0);
  anchor.group.add(plane);

  anchor.onTargetFound = () => {
    videoRecuerdo.play().catch(()=>{});
    document.getElementById('titulo').textContent = FOTOS[0].titulo;
    document.getElementById('recuerdo').textContent = FOTOS[0].recuerdo;
    document.getElementById('panel').classList.add('visible');
    document.getElementById('indicador').classList.add('oculto');
  };

  anchor.onTargetLost = () => {
    videoRecuerdo.pause();
    document.getElementById('panel').classList.remove('visible');
    document.getElementById('indicador').classList.remove('oculto');
  };

  await mindarController.start();
  
// Corregir brillo en Samsung
const canvas = document.querySelector('canvas');
if (canvas) canvas.style.filter = 'brightness(3)';

// Corregir video de cámara
const camVideo = document.querySelector('#contenedor video');
if (camVideo) camVideo.style.filter = 'brightness(3)';
  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });
}
</script>

</body>
</html>
