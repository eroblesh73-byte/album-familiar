<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0">

<title>RS IA - Álbum Familiar AR</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#c4813a">

<meta
  name="mobile-web-app-capable"
  content="yes">

<meta
  name="apple-mobile-web-app-capable"
  content="yes">

<meta
  name="apple-mobile-web-app-status-bar-style"
  content="black-translucent">

<!-- LIBRERÍAS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.136.0/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  overflow:hidden;
  font-family:Georgia,serif;
}

/* SPLASH */

#splash{
  position:fixed;
  inset:0;

  background:
  linear-gradient(
    160deg,
    #2c1a0e,
    #1a1008
  );

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;

  z-index:999;
}

#splash h1{
  color:#f5e6c8;
  margin-bottom:10px;
  font-size:2rem;
}

#splash p{
  color:#c4a97d;
  margin-bottom:30px;
  max-width:320px;
  line-height:1.6;
}

#splash button{

  background:#c4813a;
  color:white;

  border:none;

  border-radius:50px;

  padding:15px 35px;

  font-size:18px;

  cursor:pointer;
}

/* CONTENEDOR */

#contenedor{
  position:fixed;
  inset:0;
  display:none;
}

/* INDICADOR */

#indicador{

  position:fixed;

  top:20px;
  left:50%;

  transform:translateX(-50%);

  background:rgba(0,0,0,.75);

  color:white;

  padding:10px 20px;

  border-radius:30px;

  z-index:100;
}

/* PANEL */

#panel{

  position:fixed;

  left:0;
  right:0;
  bottom:0;

  background:
  rgba(20,12,4,.92);

  padding:20px;

  transform:translateY(100%);

  transition:.3s;

  z-index:100;
}

#panel.visible{
  transform:translateY(0);
}

#titulo{
  color:#f5e6c8;
  margin-bottom:10px;
}

#recuerdo{
  color:#c4a97d;
  line-height:1.6;
}

/* VIDEO */

#video-recuerdo{
  display:none;
}

</style>

</head>

<body>

<!-- SPLASH -->

<div id="splash">

  <div
    style="
      font-size:70px;
      margin-bottom:20px;
    ">
    📷
  </div>

  <h1>
    RS IA
  </h1>

  <p>
    Apunta la cámara a una fotografía
    para revivir un recuerdo familiar.
  </p>

  <button onclick="iniciar()">
    Abrir cámara
  </button>

</div>

<!-- CONTENEDOR AR -->

<div id="contenedor">

  <div id="indicador">
    📸 Apunta a una fotografía...
  </div>

</div>

<!-- PANEL -->

<div id="panel">

  <h2 id="titulo"></h2>

  <p id="recuerdo"></p>

</div>

<!-- VIDEO -->

<video
  id="video-recuerdo"
  src="./videos/video1.mp4"
  loop
  playsinline
  crossorigin="anonymous">
</video>

<script>

/* RECUERDOS */

const FOTOS = [

{
  titulo:"Mi recuerdo",

  recuerdo:
  "Aquí va tu recuerdo especial."
}

];

/* INICIAR */

async function iniciar(){

  try{

    /* OCULTAR SPLASH */

    document
      .getElementById("splash")
      .style.display = "none";

    document
      .getElementById("contenedor")
      .style.display = "block";

    /* VALIDAR LIBRERÍAS */

    if(!window.MINDAR){

      alert("MindAR no cargó");

      return;
    }

    if(!window.THREE){

      alert("Three.js no cargó");

      return;
    }

    /* INICIAR MINDAR */

    const mindarThree =
      new window.MINDAR
      .IMAGE
      .MindARThree({

        container:
          document.querySelector(
            "#contenedor"
          ),

        imageTargetSrc:
          "./foto1.mind"
    });

    const {
      renderer,
      scene,
      camera
    } = mindarThree;

    /* LUZ */

    const light =
      new THREE.HemisphereLight(
        0xffffff,
        0xbbbbff,
        1
      );

    scene.add(light);

    /* VIDEO */

    const video =
      document.getElementById(
        "video-recuerdo"
      );

    video.volume = 1;
    video.muted = false;

    /* ANCHOR */

    const anchor =
      mindarThree.addAnchor(0);

    /* TEXTURA */

    const texture =
      new THREE.VideoTexture(video);

    /* PLANO */

    const plane =
      new THREE.Mesh(

        new THREE.PlaneGeometry(
          1,
          0.56
        ),

        new THREE.MeshBasicMaterial({
          map:texture
        })

      );

    anchor.group.add(plane);

    /* DETECTAR FOTO */

    anchor.onTargetFound =
      async () => {

      try{

        await video.play();

      }catch(e){

        console.log(e);
      }

      document
        .getElementById("titulo")
        .textContent =
          FOTOS[0].titulo;

      document
        .getElementById("recuerdo")
        .textContent =
          FOTOS[0].recuerdo;

      document
        .getElementById("panel")
        .classList
        .add("visible");
    };

    /* PERDER FOTO */

    anchor.onTargetLost = () => {

      video.pause();

      document
        .getElementById("panel")
        .classList
        .remove("visible");
    };

    /* INICIAR CÁMARA */

    await mindarThree.start();

    /* RENDER */

    renderer.setAnimationLoop(() => {

      renderer.render(
        scene,
        camera
      );

    });

    console.log(
      "MindAR iniciado correctamente"
    );

  }catch(error){

    console.error(error);

    alert(
      "Error:\n\n" +
      error.message
    );
  }
}

/* SERVICE WORKER */

if("serviceWorker" in navigator){

  window.addEventListener(
    "load",

    () => {

      navigator
        .serviceWorker

        .register("./sw.js")

        .then(() => {

          console.log(
            "Service Worker registrado"
          );

        })

        .catch((err) => {

          console.log(
            "Error SW:",
            err
          );

        });

    }
  );
}

</script>

</body>
</html>
